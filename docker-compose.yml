services:
  agro_gee_api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-agro_gee_api}
      ENVIRONMENT: ${ENVIRONMENT:-}
      APP_ENV: ${APP_ENV:-}
      GEE_AUTH_MODE: ${GEE_AUTH_MODE:-}
      GEE_PROJECT_ID: ${GEE_PROJECT_ID:-}
      GEE_SERVICE_ACCOUNT_EMAIL: ${GEE_SERVICE_ACCOUNT_EMAIL:-}
      GEE_PRIVATE_KEY: ${GEE_PRIVATE_KEY:-}
      GEE_OAUTH_CLIENT_ID: ${GEE_OAUTH_CLIENT_ID:-}
      GEE_OAUTH_CLIENT_SECRET: ${GEE_OAUTH_CLIENT_SECRET:-}
      GEE_OAUTH_REFRESH_TOKEN: ${GEE_OAUTH_REFRESH_TOKEN:-}
      GEE_AUTH_TEST_ENABLED: ${GEE_AUTH_TEST_ENABLED:-}
    ports:
      - "${API_PORT:-8000}:8000"
