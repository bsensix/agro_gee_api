services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agro_insight}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agro_insight}"]
      interval: 10s
      timeout: 5s
      retries: 5

  agro_gee_api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-agro_gee_api}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT_INTERNAL:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agro_insight}
      ENVIRONMENT: ${ENVIRONMENT:-}
      APP_ENV: ${APP_ENV:-}
      GEE_AUTH_MODE: ${GEE_AUTH_MODE:-}
      GEE_PROJECT_ID: ${GEE_PROJECT_ID:-}
      GEE_SERVICE_ACCOUNT_EMAIL: ${GEE_SERVICE_ACCOUNT_EMAIL:-}
      GEE_PRIVATE_KEY: ${GEE_PRIVATE_KEY:-}
      GEE_OAUTH_CLIENT_ID: ${GEE_OAUTH_CLIENT_ID:-}
      GEE_OAUTH_CLIENT_SECRET: ${GEE_OAUTH_CLIENT_SECRET:-}
      GEE_OAUTH_REFRESH_TOKEN: ${GEE_OAUTH_REFRESH_TOKEN:-}
      GEE_AUTH_TEST_ENABLED: ${GEE_AUTH_TEST_ENABLED:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
